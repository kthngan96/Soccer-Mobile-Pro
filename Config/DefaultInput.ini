[/Script/Engine.InputSettings]
bUseMouseForTouch=False
bEnableMotionControls=True
bEnableFOVScaling=True
FOVScale=0.011110
DoubleTapTime=0.200000
bEnableGestureRecognizer=True
bUseAutocorrect=False
DefaultViewportMouseLockMode=DoNotLock
DefaultPlayerInputClass=/Script/EnhancedInput.EnhancedPlayerInput
DefaultInputComponentClass=/Script/EnhancedInput.EnhancedInputComponent

; ---------------------
; TOUCH GESTURES
; ---------------------
+GestureBindings=(GestureName="Tap",bExecuteWhenPaused=False)
+GestureBindings=(GestureName="DoubleTap",bExecuteWhenPaused=False)
+GestureBindings=(GestureName="Hold",bExecuteWhenPaused=False)
+GestureBindings=(GestureName="TwoFingerTap",bExecuteWhenPaused=False)
+GestureBindings=(GestureName="SwipeLeftRight",bExecuteWhenPaused=False)
+GestureBindings=(GestureName="SwipeUpDown",bExecuteWhenPaused=False)
+GestureBindings=(GestureName="Pinch",bExecuteWhenPaused=False)

; ---------------------
; VIRTUAL JOYSTICK
; ---------------------
+DefaultTouchInterface=/Game/UI/Input/DefaultVirtualJoystick.DefaultVirtualJoystick

; ---------------------
; ENHANCED INPUT CONTEXTS
; (Defined in Data Assets under /Game/Input/)
; ---------------------
; IMC_Match     — in-match controls (joystick, pass, shoot, through, skill)
; IMC_Menu      — menu navigation (swipe, tap, back)
; IMC_Spectator — spectator view controls

; ---------------------
; GAMEPAD SUPPORT (optional, for MFi / Xbox controllers on mobile)
; ---------------------
+ActionMappings=(ActionName="Pass",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_FaceButton_Left)
+ActionMappings=(ActionName="Shoot",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_FaceButton_Bottom)
+ActionMappings=(ActionName="Through",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_FaceButton_Top)
+ActionMappings=(ActionName="Cross",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_FaceButton_Right)
+ActionMappings=(ActionName="Sprint",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_LeftTrigger)
+ActionMappings=(ActionName="Skill",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_RightTrigger)
+ActionMappings=(ActionName="Tackle",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_RightShoulder)
+ActionMappings=(ActionName="Pause",bShift=False,bCtrl=False,bAlt=False,bCmd=False,Key=Gamepad_Special_Right)

+AxisMappings=(AxisName="MoveX",Scale=1.000000,Key=Gamepad_LeftX)
+AxisMappings=(AxisName="MoveY",Scale=1.000000,Key=Gamepad_LeftY)
+AxisMappings=(AxisName="CameraX",Scale=1.000000,Key=Gamepad_RightX)
+AxisMappings=(AxisName="CameraY",Scale=-1.000000,Key=Gamepad_RightY)

; ---------------------
; GYROSCOPE (optional directional assist)
; ---------------------
+AxisMappings=(AxisName="GyroX",Scale=1.000000,Key=Tilt)
